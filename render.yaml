services:
  - type: web
    name: apm-backend
    env: node
    rootDir: Web-App-Builder
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: apm-frontend
    env: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm run preview
